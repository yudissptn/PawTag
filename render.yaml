databases:
  - name: pawtag-db
    plan: free

services:
  - type: web
    name: pawtag-backend
    plan: free
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerCommand: npm start
    dockerContext: backend
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: pawtag-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: pawtag-web
    plan: free
    runtime: docker
    dockerfilePath: web/Dockerfile
    dockerCommand: npm run build && npx serve dist -l 5173
    dockerContext: web
    envVars:
      - key: VITE_API_URL
        value: https://pawtag-backend-xf3e.onrender.com/api
